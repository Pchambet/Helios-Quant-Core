# Orchestrateur Paper Trading — 10h30 Paris
# Cron UTC: 08:30 en été (CEST) = 10:30 Paris | 09:30 en hiver (CET) = 09:30 Paris
# Génère l'ordre J+1 avant Gate Closure 12h00.
# Nécessite: ENTSOE_API_KEY dans Settings → Secrets and variables → Actions

name: Paper Orchestrator

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Paris
      ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.22"

      - name: Install dependencies
        run: uv sync

      - name: Validate ENTSOE_API_KEY
        run: |
          if [ -z "$ENTSOE_API_KEY" ]; then
            echo "::error::ENTSOE_API_KEY not set. Add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "ENTSOE_API_KEY is configured"

      - name: Run Orchestrateur
        run: uv run python run_paper_trader.py

      - name: Commit trades_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper/trades_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "paper: orchestrator $(date -u +%Y-%m-%d)"
            git push
          fi
