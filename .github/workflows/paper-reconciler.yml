# Réconciliateur Paper Trading — 14h00 Paris
# Cron UTC: 12:00 en été (CEST) = 14:00 Paris | 13:00 en hiver (CET) = 13:00 Paris (prix DA ~12h30)
# Calcule le PnL réel (ordres × prix EPEX) après publication day-ahead.
# Nécessite: ENTSOE_API_KEY dans Settings → Secrets and variables → Actions

name: Paper Reconciler

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  reconciler:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Paris
      ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.22"

      - name: Install dependencies
        run: uv sync

      - name: Validate ENTSOE_API_KEY
        run: |
          if [ -z "$ENTSOE_API_KEY" ]; then
            echo "::error::ENTSOE_API_KEY not set. Add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "ENTSOE_API_KEY is configured"

      - name: Run Réconciliateur
        run: uv run python run_reconciler.py

      - name: Commit paper_pnl_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper/paper_pnl_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "paper: reconciler $(date -u +%Y-%m-%d)"
            git push
          fi
